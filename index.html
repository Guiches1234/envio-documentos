<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envio de Documentos</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f4f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 430px;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      color: #1f2937;
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #4b5563;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    label {
      display: block;
      text-align: left;
      font-weight: bold;
      color: #374151;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 16px;
      background: #ffffff;
    }

    .email {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      font-weight: bold;
      color: #111827;
      word-break: break-word;
      margin-bottom: 18px;
    }

    .aviso {
      background: #fff7ed;
      border-left: 4px solid #f97316;
      border-radius: 10px;
      padding: 12px;
      text-align: left;
      color: #7c2d12;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .enviar {
      background: #0b5ed7;
      color: #ffffff;
    }

    .copiar {
      background: #198754;
      color: #ffffff;
    }

    .status {
      margin-top: 15px;
      color: #198754;
      font-weight: bold;
      min-height: 22px;
    }

    .rodape {
      margin-top: 18px;
      color: #6b7280;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Envio de Documentos</h1>

    <p>
      Selecione o atendente e envie o documento pelo aplicativo de e-mail do seu celular.
    </p>

    <label for="atendente">Atendente</label>

    <select id="atendente" onchange="atualizarAtendente()">
      <option value="joao">Guichê 1 - João Costa</option>
      <option value="luciana">Guichê 2 - Luciana Andrade</option>
      <option value="jose">Guichê 3 - José Albano</option>
      <option value="elda">Guichê 4 - Elda Nascimento</option>
    </select>

    <div class="email" id="emailBox">
      joao.costa@detran.ce.gov.br
    </div>

    <div class="aviso">
      1. Clique em Enviar Documento.<br>
      2. Anexe a CNH, RG ou documento solicitado.<br>
      3. Confira o destinatário e envie.
    </div>

    <button class="enviar" onclick="abrirEmail()">
      Enviar Documento
    </button>

    <button class="copiar" onclick="copiarEmail()">
      Copiar E-mail
    </button>

    <div class="status" id="status"></div>

    <div class="rodape">
      Este site não armazena documentos.
    </div>
  </main>

  <script>
    const atendentes = {
      joao: "joao.costa@detran.ce.gov.br",
      luciana: "luciana.andrade@detran.ce.gov.br",
      jose: "jose.albano@detran.ce.gov.br",
      elda: "elda.nascimento@detran.ce.gov.br"
    };

    let emailAtual = atendentes.joao;

    function atualizarAtendente() {
      const selecionado = document.getElementById("atendente").value;
      emailAtual = atendentes[selecionado];

      document.getElementById("emailBox").textContent = emailAtual;
      document.getElementById("status").textContent = "";
    }

    function abrirEmail() {
      const assunto = encodeURIComponent("Documentacao - Atendimento");
      const corpo = encodeURIComponent("Ola, segue em anexo a documentacao solicitada.");

      window.location.href = "mailto:" + emailAtual + "?subject=" + assunto + "&body=" + corpo;
    }

    function copiarEmail() {
      navigator.clipboard.writeText(emailAtual).then(function() {
        document.getElementById("status").textContent = "Email copiado com sucesso.";
      });
    }
  </script>
</body>
</html>
